# ==========================================
# 1. CORE APPLICATION & SERVER TUNING
# ==========================================
spring.application.name=agent-orchestrator
server.port=8080

# Optimización del motor interno (Tomcat 10)
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.connection-timeout=20000

# ==========================================
# 2. LOCALIZACIÓN Y HUSO HORARIO
# ==========================================
spring.jackson.time-zone=America/Bogota
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.time=HH:mm:ss

# ==========================================
# 3. BASE DE DATOS (POSTGRESQL CLOUD) & HIKARICP
# ==========================================
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.zwgduvbumuctydvxrosq
spring.datasource.password=AgenteOrange**1994
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# 4. JPA & HIBERNATE
# ==========================================
# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' creará/actualizará las tablas automáticamente basado en nuestras Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 5. EXTERNAL API TIMEOUTS (IA & DATOS)
# ==========================================
api.client.connect-timeout=5000
api.client.read-timeout=45000

# ==========================================
# 6. SCHEDULING (CRON JOBS)
# ==========================================
# Ejecución diaria a las 3:00 AM (Hora de Bogotá)
agent.pipeline.cron=0 0 3 * * *

# ==========================================
# 7. MONITOREO (ACTUATOR) & LOGGING
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
logging.level.com.datacancha.agent=DEBUG
logging.level.org.springframework.web=INFO

# ==========================================
# 8. RAPID API (API-SPORTS) CREDENTIALS
# ==========================================
apisports.key=737423d48fac071b5f580d41c2b8330e
apisports.host=v3.football.api-sports.io